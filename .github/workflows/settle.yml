name: Settle bets
on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
permissions:
  contents: write
jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        env:
          BF_APP_KEY: ${{ secrets.BF_APP_KEY }}
          BF_USERNAME: ${{ secrets.BF_USERNAME }}
          BF_PASSWORD: ${{ secrets.BF_PASSWORD }}
        with:
          script: |
            const fs = require('fs');
            const APP = process.env.BF_APP_KEY, U = process.env.BF_USERNAME, P = process.env.BF_PASSWORD;
            core.info('appkey len ' + (APP?APP.length:0) + ' user ' + (U?U.length:0));
            const nz = s => (s||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
            const pad = n => String(n).padStart(2,'0');
            const months = {January:1,February:2,March:3,April:4,May:5,June:6,July:7,August:8,September:9,October:10,November:11,December:12};
            const html = fs.readFileSync('index.html','utf8');
            const a = html.indexOf('var T=') + 6;
            const b = html.indexOf('];', a);
            const T = JSON.parse(html.slice(a, b+1));
            const lr = await fetch('https://identitysso.betfair.com/api/login', { method:'POST', headers:{ 'X-Application':APP, 'Content-Type':'application/x-www-form-urlencoded', 'Accept':'application/json' }, body:'username='+encodeURIComponent(U)+'&password='+encodeURIComponent(P) });
            const lt = await lr.text();
            core.info('login http ' + lr.status + ' :: ' + lt.slice(0,220));
            let lj; try { lj = JSON.parse(lt); } catch(e) { core.info('login not JSON'); return; }
            core.info('login ' + lj.status + ' ' + (lj.error||''));
            if (lj.status !== 'SUCCESS') { return; }
            const TOKEN = lj.token;
            async function bapi(op, body){ const r = await fetch('https://api.betfair.com/exchange/betting/rest/v1.0/'+op+'/', { method:'POST', headers:{ 'X-Application':APP, 'X-Authentication':TOKEN, 'Content-Type':'application/json', 'Accept':'application/json' }, body:JSON.stringify(body) }); return r.json(); }
            function betInfo(t){ const p = t.date.split(' '); return { y:2026, m:months[p[2]], d:parseInt(p[1],10) }; }
            function aestDate(iso){ const t = new Date(iso).getTime() + 10*3600*1000; const d = new Date(t); return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate()); }
            const pending = T.filter(t => !t.bsp && t.result !== 'V');
            const byDate = {};
            pending.forEach(t => { const bi = betInfo(t); const key = bi.y+'-'+pad(bi.m)+'-'+pad(bi.d); byDate[key] = byDate[key] || {info:bi, venues:{}, bets:[]}; byDate[key].venues[t.meet]=1; byDate[key].bets.push(t); });
            let changed = false;
            for (const key of Object.keys(byDate)) {
              const g = byDate[key];
              const from = new Date(Date.UTC(g.info.y, g.info.m-1, g.info.d-1)).toISOString();
              const to = new Date(Date.UTC(g.info.y, g.info.m-1, g.info.d+2)).toISOString();
              const venues = Object.keys(g.venues);
              const cat = await bapi('listMarketCatalogue', { filter:{ eventTypeIds:['7'], marketCountries:['AU'], marketTypeCodes:['WIN'], venues:venues, marketStartTime:{ from:from, to:to } }, marketProjection:['RUNNER_METADATA','EVENT','MARKET_START_TIME'], maxResults:1000 });
              core.info(key + ' markets ' + (Array.isArray(cat)?cat.length:JSON.stringify(cat).slice(0,150)));
              if (!Array.isArray(cat)) continue;
              const mkts = cat.filter(m => m.event && aestDate(m.marketStartTime)===key);
              const mids = mkts.map(m => m.marketId);
              const book = {};
              for (let i=0;i<mids.length;i+=20){ const bk = await bapi('listMarketBook', { marketIds:mids.slice(i,i+20), priceProjection:{ priceData:['SP_TRADED'] } }); if (Array.isArray(bk)) bk.forEach(mb => { book[mb.marketId] = {}; (mb.runners||[]).forEach(r => book[mb.marketId][r.selectionId] = r); }); }
              g.bets.forEach(t => {
                const vm = mkts.filter(m => nz(m.event.venue)===nz(t.meet));
                let hit=null, mid=null;
                for (const m of vm){ const rn = (m.runners||[]).find(r => nz(r.runnerName)===nz(t.horse)); if (rn){ hit=rn; mid=m.marketId; break; } }
                if (!hit){ core.info('no match ' + t.meet + ' ' + t.horse); return; }
                const bkr = book[mid] && book[mid][hit.selectionId];
                if (!bkr){ core.info('no book ' + t.horse); return; }
                if (bkr.status === 'REMOVED'){ t.result='V'; t.bsp=null; changed=true; return; }
                t.result = bkr.status === 'WINNER' ? 'W' : 'L';
                const sp = bkr.sp && bkr.sp.actualSP;
                t.bsp = (typeof sp==='number' && isFinite(sp) && sp>0) ? Math.round(sp*100)/100 : null;
                changed = true;
                core.info('settled ' + t.meet + ' ' + t.horse + ' ' + t.result + ' ' + t.bsp);
              });
            }
            if (changed) { const out = html.slice(0,a) + JSON.stringify(T) + html.slice(b+1); fs.writeFileSync('index.html', out); core.info('updated index.html'); } else { core.info('no changes'); }
      - name: Commit
        run: |
          git config user.name settle-bot
          git config user.email actions@github.com
          git add index.html
          git commit -m 'Auto-settle from Betfair SP API' || echo no-changes
          git push || echo nothing-to-push
